name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    name: Unit + CLI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup local venv
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -e .[dev]

      - name: Ruff check
        run: ./.venv/bin/ruff check .

      - name: Ruff format check
        run: ./.venv/bin/ruff format --check .

      - name: Pytest unit layer
        run: ./.venv/bin/pytest -m "not integration"

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup local venv for smoke script
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -e .[dev]
          ./.venv/bin/pip install -r requirements-docs.txt

      - name: Run smoke
        run: ./.github/scripts/smoke_ci.sh

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup local venv for integration CLI binary
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -e .[dev]

      - name: Pytest integration layer
        run: ./.venv/bin/pytest -m integration

  package:
    name: Package validation
    runs-on: ubuntu-latest
    needs: [unit, smoke, integration]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build artifacts
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*
          if-no-files-found: error

  installed-wheel-smoke:
    name: Installed wheel smoke
    runs-on: ubuntu-latest
    needs: [package]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist

      - name: Run installed wheel smoke checks
        run: ./.github/scripts/smoke_wheel.sh
