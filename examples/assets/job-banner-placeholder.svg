<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Neutral job banner</title>
  <desc id="desc">Editorial abstract banner for a fictional job detail page</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4efee" />
      <stop offset="100%" stop-color="#d5e5e2" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.78" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35" />
    </linearGradient>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)" />

  <g opacity="0.9">
    <polygon points="0,0 420,0 160,220 0,220" fill="#0b7a77" opacity="0.16" />
    <polygon points="290,0 680,0 420,240 40,240" fill="#f1a43a" opacity="0.2" />
    <polygon points="980,0 1600,0 1600,260 760,260" fill="#0f8a86" opacity="0.12" />
  </g>

  <g>
    <rect x="84" y="86" width="520" height="348" rx="18" fill="url(#panel)" stroke="#8fb6b0" stroke-opacity="0.45" />
    <rect x="112" y="120" width="464" height="18" rx="9" fill="#0b7a77" opacity="0.3" />
    <rect x="112" y="158" width="292" height="14" rx="7" fill="#0b7a77" opacity="0.22" />

    <g fill="#0b7a77" opacity="0.2">
      <rect x="112" y="210" width="138" height="98" rx="10" />
      <rect x="266" y="210" width="138" height="98" rx="10" />
      <rect x="420" y="210" width="138" height="98" rx="10" />
      <rect x="112" y="322" width="138" height="84" rx="10" />
      <rect x="266" y="322" width="138" height="84" rx="10" />
      <rect x="420" y="322" width="138" height="84" rx="10" />
    </g>
  </g>

  <g transform="translate(700 150)">
    <rect x="0" y="0" width="740" height="250" rx="22" fill="#ffffff" fill-opacity="0.42" stroke="#8fb6b0" stroke-opacity="0.5" />
    <text x="48" y="94" fill="#0b7a77" font-size="58" font-family="'Segoe UI', Arial, sans-serif" font-weight="700">Byg noget der holder</text>
    <text x="48" y="160" fill="#136f6c" font-size="40" font-family="'Segoe UI', Arial, sans-serif">Sikkerhed, samarbejde og mening i hverdagen</text>
    <text x="48" y="214" fill="#2f5b58" font-size="26" font-family="'Segoe UI', Arial, sans-serif">Fiktiv demo · ikke en rigtig virksomhedsannonce</text>
  </g>
</svg>
