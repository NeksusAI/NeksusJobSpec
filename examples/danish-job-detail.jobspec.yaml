schema_version: 1
id: isolated-jobspec-output

page:
  layout: job_detail
  layout_mode: stitch_job_detail
  language: en
  theme: soft-professional
  component_order:
    - brand_header
    - top_nav
    - header_actions
    - hero_banner
    - hero
    - hero_meta
    - about_role
    - responsibilities_cards
    - requirements
    - colleague_quote
    - culture
    - process
    - company
    - legal
    - sidebar_meta
    - sidebar_social
    - sidebar_map

job:
  title: Senior Systems Architect
  intro: We are seeking a Senior Systems Architect to lead the design and evolution of our containerized CLI ecosystem.
  apply:
    label: Apply Now
    url: https://example.com/jobs/senior-systems-architect

components:
  - type: header_brand
    id: brand_header
    variant: bar
    placement: fullwidth
    region: header
    brand_name: Codex Systems

  - type: nav_links
    id: top_nav
    variant: top
    placement: fullwidth
    region: header
    links:
      - label: Jobs
        url: https://example.com/jobs
      - label: Teams
        url: https://example.com/teams
      - label: Company
        url: https://example.com/company
        active: true

  - type: header_actions
    id: header_actions
    variant: buttons
    placement: fullwidth
    region: header
    actions:
      - label: Apply Now
        url: https://example.com/jobs/senior-systems-architect
        variant: primary
        size: md
        intent: primary

  - type: hero_banner
    id: hero_banner
    variant: cover
    placement: fullwidth
    region: hero
    image_url: https://lh3.googleusercontent.com/aida-public/AB6AXuBP7eiY08JzrrHzVBNG0b8cSa2T8AYepZGIzOqEG3IThlXtGYg7jZ1GKMw8NfMQB5eYFiZtXfAaKealTDv44YaN5uDMWIIamTqBS2mnvSyQYp4wd86_d0EKUbsonXAanZ-B7BGX5A3R85JBXMRTXMtujqjO3LeXDN7z4Zot5YRLbpJZf5_Ln9x7mP2y-IDGT11jB7xbIiBvu1D4o3lj1-hwtbjWAn1_E6ZmrS8aWWDhyBK1EMBIWqa-EBAumbiO43oBtKZaEUk0MNcI
    alt: Map image

  - type: hero
    id: hero
    variant: split
    region: hero
    title: Senior Systems Architect
    subtitle: San Francisco, CA · Full-time
    intro: We are seeking a Senior Systems Architect to lead the design and evolution of our containerized CLI ecosystem.

  - type: meta_chips
    id: hero_meta
    variant: pills
    region: hero
    items:
      - label: Location
        value: San Francisco, CA
        icon: location_on
      - label: Salary
        value: $180k - $240k
        icon: payments
      - label: Type
        value: Full-time
        icon: work

  - type: rich_text
    id: about_role
    variant: highlighted
    region: main
    title: About the Role
    body: You will bridge high-level architecture and low-level execution to ensure resilient, scalable distributed systems.

  - type: feature_grid
    id: responsibilities_cards
    variant: cards
    region: main
    columns_mobile: 1
    columns_desktop: 2
    title: Key Responsibilities
    items:
      - title: System Design
        body: Design microservices architectures for low-latency terminal interactions.
        icon: architecture
      - title: Cloud Orchestration
        body: Manage Kubernetes clusters and CI/CD pipelines for CLI distributions.
        icon: cloud_sync
      - title: Security and Reliability
        body: Implement zero-trust security and 99.99% uptime strategies.
        icon: security

  - type: list
    id: requirements
    variant: bullets
    region: main
    title: Requirements
    items:
      - 8+ years in systems architecture or distributed systems.
      - Expertise with Kubernetes, cloud networking, and observability.
      - Strong security engineering mindset.

  - type: quote
    id: colleague_quote
    variant: pullquote
    region: main
    quote: This role is where architecture strategy becomes measurable production impact.
    author: Hiring Team

  - type: benefits
    id: culture
    variant: cards
    region: main
    title: Why Join
    items:
      - text: High-autonomy technical leadership role.
        icon: check_circle
      - text: Competitive compensation and equity.
        icon: check_circle

  - type: application_process
    id: process
    variant: steps
    region: main
    title: Process
    body: We review applications quickly and move qualified candidates through interview loops.
    steps:
      - Submit application
      - Recruiter intro
      - Technical interviews

  - type: company_profile
    id: company
    variant: card
    region: main
    title: Company
    body: We build developer-first systems that combine local CLI ergonomics with resilient cloud primitives.

  - type: legal
    id: legal
    variant: muted
    region: main
    title: Equal Opportunity
    body: We are an equal opportunity employer and consider all qualified applicants.

  - type: meta_panel
    id: sidebar_meta
    variant: card
    placement: sidebar
    region: sidebar
    title: Job Details
    facts:
      - label: Team
        value: Platform Architecture
        icon: groups
      - label: Req ID
        value: ARC-2026-014
        icon: sell
    contact_name: Recruiting
    contact_email: jobs@example.com

  - type: social_links
    id: sidebar_social
    variant: icons
    placement: sidebar
    region: sidebar
    title: Share
    links:
      - label: LinkedIn
        url: https://www.linkedin.com
        icon: share

  - type: location_map
    id: sidebar_map
    variant: map
    placement: sidebar
    region: sidebar
    title: Location
    map_url: https://maps.google.com/?q=San+Francisco
    address: San Francisco, CA
    embed: false

rendering:
  web:
    template: soft-professional
