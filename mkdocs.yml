site_name: Neksus JobSpec
site_description: Open-source job specification schema and CLI tooling for structured, portable job descriptions.
site_url: https://docs.jobspec.neksusai.com/
repo_name: NeksusAI/NeksusJobSpec
repo_url: https://github.com/NeksusAI/NeksusJobSpec
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - Home: index.md
  - Guides:
      - Getting Started: guides/getting-started.md
      - Installation: guides/installation.md
      - Quickstart: guides/quickstart.md
      - Examples: guides/examples.md
      - Examples Library: guides/examples-library.md
      - Migration 0.1.0 to 0.2.x: guides/migration-0.1-to-0.2.md
      - Soft-Professional Guide: guides/soft-professional-guide.md
      - Content vs Theme: guides/content-vs-theme.md
      - Render Troubleshooting: guides/render-troubleshooting.md
      - LLM Usage: llm-usage.md
      - Exports: exports.md
  - Reference:
      - CLI Reference: reference/cli-reference.md
      - Python API: reference/python-api.md
      - API Reference: reference/api-reference.md
      - Internal API Reference: reference/internal-api-reference.md
      - Schema: reference/schema.md
      - Schema Editor Integration: reference/schema-editor-integration.md
      - Model Reference: reference/model-reference.md
  - Concepts:
      - JobSpec Format: concepts/specification.md
      - How It Works: concepts/how-it-works.md
      - Architecture: concepts/architecture.md
      - Rendering: concepts/rendering.md
      - Themes: concepts/themes.md
  - Integrations:
      - Assistant Usage: integrations/assistant-usage.md
      - LLM Integrations: integrations/llm-integrations.md
      - MCP Server: integrations/mcp-server.md
  - Project Policy:
      - Contributing: project/contributing.md
      - Security: project/security.md
      - Versioning and Compatibility: project/versioning.md
      - Release Notes: project/release-notes.md
      - Roadmap Boundaries: roadmap-boundaries.md
