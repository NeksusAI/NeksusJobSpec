schema_version: 1
id: onsite-operations-manager
title: Onsite Operations Manager
department: Operations
level: Mid
location:
  type: onsite
  city: Copenhagen
  country: Denmark
summary: "Oversee day-to-day office operations and ensure hiring and onboarding programs run smoothly for local teams."
responsibilities:
  - "Coordinate office vendors, facilities planning, and internal event logistics."
  - "Maintain operational playbooks for onboarding, workplace safety, and compliance routines."
  - "Partner with recruiting and HR to schedule interview loops and candidate visit logistics."
requirements:
  - "3+ years of experience in operations, facilities, or workplace management."
  - "Strong organizational skills and ability to manage multiple parallel priorities."
  - "Comfort using spreadsheets and operational dashboards for reporting."
nice_to_have:
  - "Experience supporting fast-growing technology organizations."
employment:
  type: full-time
